<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
<div class="section-1">
        <h1 class="section-1__name">Dharani K</h1>
        <p class="section-1__role">Web Developer</p>
        <a class="section-1__contact" href="index.html">Home</a>
    </div>
    <div class="contact-form">
<form>
    <table>
        <tr>
            <td>Name:</td>     
            <td><input type="text" placeholder="Enter your Name" class="contact-form__input"></td> 
        </tr>
        <tr>
            <td>Email:</td>     
            <td><input type="email" placeholder="Enter your Email" class="contact-form__input"></td> 
        </tr>
        <tr>
            <td>Message:</td>     
            <td><textarea placeholder="Enter your Message" class="contact-form__textarea"></textarea>
            </td> 
        </tr>
        <tr>
            <td></td>
            <td><input type="submit" class="contact-form__submit"></td>
        </tr>
    </table>
</form>
</div>
<div class="section-5">
<p class="section-5__title">Social Media:
    <a href="">Instagram</a>,
    <a href="">LinkedIn</a></p>
    <p class="section-5__desc">&copy;Dharani k</p>
    </div>
</div>
</body>
</html>
